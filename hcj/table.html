<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    td,
    th {
      border: 0.1px solid #dddddd;
      text-align: left;
      padding: 8px;
    }
    /* tr:nth-child(even) {
      background-color: #dddddd;
    } */
    /* 이거 왜 띄워져있지 */

    th,
    td {
      padding: 8px;
    }
  </style>

  <body>
    <table>
      <caption>
        상품 구성
      </caption>

      <tbody>
        <tr>
          <th>용도</th>
          <th>중량</th>
          <th>갯수</th>
          <th>가격</th>
        </tr>

        <tr>
          <td rowspan="2">선물용</td>
          <td>3kg</td>
          <td>11-16</td>
          <td>35,000원</td>
        </tr>

        <tr>
          <td>5kg</td>
          <td>18-26</td>
          <td>47,000원</td>
        </tr>

        <tr>
          <td rowspan="2">가정용</td>
          <td>3kg</td>
          <td>11-16</td>
          <td>35,000원</td>
        </tr>

        <tr>
          <td>5kg</td>
          <td>18-26</td>
          <td>47,000원</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td>합계</td>
          <td colspan="2"></td>
          <td>147,000원</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
